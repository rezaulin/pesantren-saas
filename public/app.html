<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pesantren Absensi - Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--primary:#6366f1;--primary-dark:#4f46e5;--primary-light:#818cf8;--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--text:#f8fafc;--text2:#94a3b8;--text3:#64748b;--glass:rgba(255,255,255,0.06);--glass-border:rgba(255,255,255,0.1);--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--info:#3b82f6;--radius:12px;--sidebar-w:260px}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  .login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:radial-gradient(ellipse at 30% 30%,rgba(99,102,241,.15) 0%,transparent 50%),radial-gradient(ellipse at 70% 70%,rgba(139,92,246,.1) 0%,transparent 50%)}
  .login-card{width:100%;max-width:420px;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:36px;backdrop-filter:blur(20px)}
  .login-header{text-align:center;margin-bottom:28px}
  .login-logo{width:56px;height:56px;background:linear-gradient(135deg,var(--primary),#8b5cf6);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:1.5rem}
  .login-header h1{font-size:1.4rem;font-weight:700}.login-header p{color:var(--text2);font-size:.85rem;margin-top:4px}
  .tabs{display:flex;gap:4px;background:rgba(0,0,0,.3);border-radius:10px;padding:4px;margin-bottom:20px}
  .tab{flex:1;padding:9px;text-align:center;border-radius:8px;cursor:pointer;font-weight:500;font-size:.82rem;color:var(--text2);transition:all .2s;border:none;background:none;font-family:inherit}
  .tab.active{background:var(--primary);color:#fff}
  .form-group{margin-bottom:14px}
  .form-group label{display:block;margin-bottom:5px;font-weight:500;font-size:.82rem;color:var(--text2)}
  .form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 14px;background:rgba(0,0,0,.3);border:1px solid var(--glass-border);border-radius:8px;color:var(--text);font-size:.92rem;transition:all .2s;font-family:inherit}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
  .btn{padding:11px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:.9rem;transition:all .2s;display:inline-flex;align-items:center;gap:7px;font-family:inherit}
  .btn-primary{background:linear-gradient(135deg,var(--primary),#8b5cf6);color:#fff;width:100%;justify-content:center}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,.35)}
  .btn-sm{padding:7px 14px;font-size:.8rem}
  .btn-outline{background:transparent;color:var(--text);border:1px solid var(--glass-border)}
  .btn-outline:hover{background:var(--glass)}
  .btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{opacity:.9}
  .btn-success{background:var(--success);color:#fff}.btn-success:hover{opacity:.9}
  .btn-warning{background:var(--warning);color:#000}.btn-warning:hover{opacity:.9}
  .btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
  .app{display:none;min-height:100vh}
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--glass-border);z-index:100;display:flex;flex-direction:column;transition:transform .3s}
  .sidebar-head{padding:18px 16px;border-bottom:1px solid var(--glass-border)}
  .sidebar-head .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.05rem}
  .sidebar-head .brand-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--primary),#8b5cf6);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem}
  .sidebar-head .brand small{display:block;color:var(--text3);font-weight:400;font-size:.7rem;margin-top:2px}
  .sidebar-nav{flex:1;overflow-y:auto;padding:10px 0}
  .sidebar-nav::-webkit-scrollbar{width:4px}.sidebar-nav::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}
  .nav-section{padding:8px 16px 4px;font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-weight:600}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;transition:all .15s;color:var(--text2);font-size:.85rem;border-left:3px solid transparent}
  .nav-item:hover{background:var(--glass);color:var(--text)}
  .nav-item.active{background:rgba(99,102,241,.12);color:var(--primary-light);border-left-color:var(--primary)}
  .nav-item i{width:18px;height:18px;flex-shrink:0}
  .sidebar-footer{padding:12px 16px;border-top:1px solid var(--glass-border)}
  .user-info{display:flex;align-items:center;gap:10px;font-size:.82rem}
  .user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#8b5cf6);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem}
  .user-info .name{font-weight:600;font-size:.82rem}.user-info .role{color:var(--text3);font-size:.7rem}
  .btn-logout{margin-top:8px;width:100%;justify-content:center;font-size:.78rem;padding:7px}
  .main{margin-left:var(--sidebar-w);min-height:100vh}
  .topbar{position:sticky;top:0;z-index:50;background:rgba(15,23,42,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--glass-border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
  .topbar h2{font-size:1.15rem;font-weight:700}
  .topbar-actions{display:flex;align-items:center;gap:10px}
  .hamburger{display:none;background:none;border:none;color:var(--text);cursor:pointer;padding:4px}
  .content{padding:24px;max-width:1200px}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
  .stat-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:20px}
  .stat-card .label{font-size:.78rem;color:var(--text2);margin-bottom:6px;display:flex;align-items:center;gap:6px}
  .stat-card .value{font-size:1.6rem;font-weight:800}
  .stat-card .sub{font-size:.72rem;color:var(--text3);margin-top:4px}
  .card{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);overflow:hidden}
  .card-header{padding:16px 20px;border-bottom:1px solid var(--glass-border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .card-header h3{font-size:1rem;font-weight:700}
  .card-body{padding:0}
  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:.84rem}
  th{padding:10px 16px;text-align:left;font-weight:600;color:var(--text2);background:rgba(0,0,0,.2);font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
  td{padding:10px 16px;border-top:1px solid var(--glass-border);white-space:nowrap}
  tr:hover td{background:rgba(255,255,255,.02)}
  .search-box{padding:9px 14px;background:rgba(0,0,0,.3);border:1px solid var(--glass-border);border-radius:8px;color:var(--text);font-size:.84rem;width:220px;font-family:inherit}
  .search-box:focus{outline:none;border-color:var(--primary)}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:600}
  .badge-success{background:rgba(16,185,129,.15);color:var(--success)}
  .badge-warning{background:rgba(245,158,11,.15);color:var(--warning)}
  .badge-danger{background:rgba(239,68,68,.15);color:var(--danger)}
  .badge-info{background:rgba(59,130,246,.15);color:var(--info)}
  .actions{display:flex;gap:6px}
  .icon-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--glass-border);background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .icon-btn:hover{background:var(--glass);color:var(--text)}
  .icon-btn.danger:hover{background:rgba(239,68,68,.15);color:var(--danger)}
  .empty{text-align:center;padding:40px 20px;color:var(--text3)}
  .empty i{font-size:2rem;margin-bottom:10px;display:block}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.show{display:flex}
  .modal{background:var(--bg2);border:1px solid var(--glass-border);border-radius:var(--radius);width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
  .modal-header{padding:18px 20px;border-bottom:1px solid var(--glass-border);display:flex;align-items:center;justify-content:space-between}
  .modal-header h3{font-size:1rem;font-weight:700}
  .modal-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:1.2rem;padding:4px}
  .modal-body{padding:20px}
  .modal-footer{padding:14px 20px;border-top:1px solid var(--glass-border);display:flex;justify-content:flex-end;gap:8px}
  .toast-container{position:fixed;top:16px;right:16px;z-index:300;display:flex;flex-direction:column;gap:8px}
  .toast{padding:12px 18px;border-radius:8px;font-size:.84rem;font-weight:500;animation:slideIn .3s;display:flex;align-items:center;gap:8px;min-width:250px;box-shadow:0 8px 24px rgba(0,0,0,.3)}
  .toast.success{background:var(--success);color:#fff}
  .toast.error{background:var(--danger);color:#fff}
  .toast.info{background:var(--info);color:#fff}
  @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
  .pagination{display:flex;align-items:center;justify-content:center;gap:4px;padding:14px}
  .page-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--glass-border);background:transparent;color:var(--text2);cursor:pointer;font-size:.8rem;transition:all .15s}
  .page-btn:hover,.page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
  .page-btn:disabled{opacity:.3;cursor:not-allowed}
  .sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;display:none}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .row .col{flex:1;min-width:200px}
  .mb-3{margin-bottom:12px}
  .mb-4{margin-bottom:16px}
  .mt-3{margin-top:12px}
  .text-center{text-align:center}
  .text-muted{color:var(--text3)}
  .fw-600{font-weight:600}
  @media(max-width:768px){
    .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.sidebar-overlay.show{display:block}
    .main{margin-left:0}.hamburger{display:block}.content{padding:16px}
    .stats-grid{grid-template-columns:repeat(2,1fr)}.search-box{width:100%}
  }
  @media(max-width:480px){.stats-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>

<div class="login-wrap" id="loginPage">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">&#x1F3D7;&#xFE0F;</div>
      <h1>Pesantren Absensi</h1>
      <p>Masuk ke akun Anda</p>
    </div>
    <div class="tabs">
      <button type="button" class="tab active" data-tab="admin">Admin / Ustadz</button>
      <button type="button" class="tab" data-tab="wali">Wali</button>
      <button type="button" class="tab" data-tab="super">Super Admin</button>
    </div>
    <form id="loginForm"></form>
  </div>
</div>

<div class="app" id="appPage">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="brand">
        <div class="brand-icon">&#x1F3D7;&#xFE0F;</div>
        <div><span id="sidebarAppName">Pesantren Absensi</span><small id="sidebarSekolah">-</small></div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">A</div>
        <div><div class="name" id="userName">-</div><div class="role" id="userRole">-</div></div>
      </div>
      <button class="btn btn-outline btn-logout" onclick="logout()">Keluar</button>
    </div>
  </aside>
  <div class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="hamburger" onclick="toggleSidebar()"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
        <h2 id="pageTitle">Dashboard</h2>
      </div>
      <div class="topbar-actions" id="topbarActions"></div>
    </header>
    <div class="content" id="pageContent"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header"><h3 id="modalTitle">Modal</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>

<script>

// ===== STATE =====
const S = {
  token: localStorage.getItem('pa_token'),
  user: JSON.parse(localStorage.getItem('pa_user') || 'null'),
  sekolah: null,
  page: location.hash.slice(1) || 'dashboard',
  slug: new URLSearchParams(location.search).get('slug') || location.hostname.split('.')[0]
};

// ===== API =====
function getSlug() {
  const h = location.hostname;
  const p = h.split('.');
  if (p.length >= 3 && p[0] !== 'www') return p[0];
  return new URLSearchParams(location.search).get('slug') || localStorage.getItem('pa_slug') || '';
}

async function api(path, opts = {}) {
  const slug = getSlug();
  const headers = { 'Content-Type': 'application/json' };
  if (S.token) headers['Authorization'] = 'Bearer ' + S.token;
  if (slug) headers['X-Tenant-Slug'] = slug;
  const res = await fetch(path, { ...opts, headers: { ...headers, ...(opts.headers || {}) } });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    if (res.status === 401) { logout(); throw new Error('Sesi habis'); }
    throw new Error(data.error || 'Request gagal');
  }
  return data;
}

// ===== TOAST =====
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML = '<span>' + msg + '</span>';
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ===== MODAL =====
function openModal(title, bodyHtml, footerHtml) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalFooter').innerHTML = footerHtml;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

// ===== AUTH =====
let loginTab = 'admin';
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    loginTab = t.dataset.tab;
    renderLoginFields();
  });
});

function renderLoginFields() {
  const f = document.getElementById('loginForm');
  if (loginTab === 'admin') {
    f.innerHTML = `
      <div class="form-group"><label>Username</label><input name="username" required></div>
      <div class="form-group"><label>Password</label><input name="password" type="password" required></div>
      <div class="form-group"><label>Slug Pesantren</label><input name="slug" value="${S.slug}" placeholder="contoh: darul-hikmah"></div>
      <button type="submit" class="btn btn-primary">Masuk</button>`;
  } else if (loginTab === 'wali') {
    f.innerHTML = `
      <div class="form-group"><label>NIS / Nama Santri</label><input name="identitas" required></div>
      <div class="form-group"><label>Slug Pesantren</label><input name="slug" value="${S.slug}" placeholder="contoh: darul-hikmah"></div>
      <button type="submit" class="btn btn-primary">Masuk sebagai Wali</button>`;
  } else {
    f.innerHTML = `
      <div class="form-group"><label>Username</label><input name="username" required></div>
      <div class="form-group"><label>Password</label><input name="password" type="password" required></div>
      <button type="submit" class="btn btn-primary">Masuk sebagai Super Admin</button>`;
  }
}

async function handleLogin(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const d = Object.fromEntries(fd);
  const btn = e.target.querySelector('button[type=submit]');
  btn.disabled = true; btn.textContent = 'Memproses...';
  try {
    let res;
    if (loginTab === 'admin') {
      localStorage.setItem('pa_slug', d.slug);
      res = await fetch('/api/login', { method: 'POST', headers: {'Content-Type':'application/json','X-Tenant-Slug':d.slug}, body: JSON.stringify({username:d.username, password:d.password}) });
    } else if (loginTab === 'wali') {
      localStorage.setItem('pa_slug', d.slug);
      res = await fetch('/api/login-wali', { method: 'POST', headers: {'Content-Type':'application/json','X-Tenant-Slug':d.slug}, body: JSON.stringify({identitas:d.identitas}) });
    } else {
      res = await fetch('/api/super/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username:d.username, password:d.password}) });
    }
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login gagal');
    S.token = data.token; S.user = data.user;
    localStorage.setItem('pa_token', data.token);
    localStorage.setItem('pa_user', JSON.stringify(data.user));
    toast('Login berhasil!');
    initApp();
  } catch (err) { toast(err.message, 'error'); }
  btn.disabled = false; btn.textContent = 'Masuk';
}

function logout() {
  S.token = null; S.user = null; S.sekolah = null;
  localStorage.removeItem('pa_token'); localStorage.removeItem('pa_user');
  document.getElementById('loginPage').style.display = '';
  document.getElementById('appPage').style.display = 'none';
  renderLoginFields();
}

// ===== SIDEBAR =====
const menuConfig = {
  admin: [
    {section:'Utama', items:[
      {id:'dashboard',icon:'layout-dashboard',label:'Dashboard'},
    ]},
    {section:'Data Master', items:[
      {id:'santri',icon:'users',label:'Santri'},
      {id:'kamar',icon:'bed-double',label:'Kamar'},
      {id:'kelas',icon:'school',label:'Kelas'},
      {id:'kegiatan',icon:'calendar-check',label:'Kegiatan'},
      {id:'kelompok',icon:'users-round',label:'Kelompok'},
    ]},
    {section:'Operasional', items:[
      {id:'jadwal',icon:'calendar-clock',label:'Jadwal'},
      {id:'absensi',icon:'clipboard-check',label:'Absensi'},
      {id:'absen-malam',icon:'moon',label:'Absen Malam'},
      {id:'absen-sekolah',icon:'graduation-cap',label:'Absen Sekolah'},
    ]},
    {section:'Akademik', items:[
      {id:'pelanggaran',icon:'alert-triangle',label:'Pelanggaran'},
      {id:'catatan',icon:'notebook-pen',label:'Catatan Guru'},
      {id:'pengumuman',icon:'megaphone',label:'Pengumuman'},
      {id:'rekap',icon:'bar-chart-3',label:'Rekap'},
    ]},
    {section:'Sistem', items:[
      {id:'users',icon:'shield',label:'Pengguna'},
      {id:'settings',icon:'settings',label:'Pengaturan'},
    ]},
  ],
  ustadz: [
    {section:'Utama', items:[
      {id:'dashboard',icon:'layout-dashboard',label:'Dashboard'},
    ]},
    {section:'Operasional', items:[
      {id:'absensi',icon:'clipboard-check',label:'Absensi'},
      {id:'kelompok',icon:'users-round',label:'Kelompok'},
    ]},
    {section:'Akademik', items:[
      {id:'pelanggaran',icon:'alert-triangle',label:'Pelanggaran'},
      {id:'catatan',icon:'notebook-pen',label:'Catatan Guru'},
      {id:'pengumuman',icon:'megaphone',label:'Pengumuman'},
    ]},
  ],
  wali: [
    {section:'Menu', items:[
      {id:'dashboard',icon:'layout-dashboard',label:'Dashboard'},
      {id:'pengumuman',icon:'megaphone',label:'Pengumuman'},
    ]},
  ],
  superadmin: [
    {section:'Super Admin', items:[
      {id:'super-dashboard',icon:'layout-dashboard',label:'Dashboard'},
      {id:'super-sekolah',icon:'building-2',label:'Kelola Sekolah'},
      {id:'super-paket',icon:'package',label:'Paket'},
    ]},
  ],
};

function renderSidebar() {
  const role = S.user?.role || 'admin';
  const menus = menuConfig[role] || menuConfig.admin;
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = menus.map(g => `
    <div class="nav-section">${g.section}</div>
    ${g.items.map(it => `<div class="nav-item${S.page===it.id?' active':''}" data-page="${it.id}"><i data-lucide="${it.icon}"></i><span>${it.label}</span></div>`).join('')}
  `).join('');
  nav.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => navigateTo(el.dataset.page));
  });
  lucide.createIcons();
}

function navigateTo(page) {
  S.page = page;
  location.hash = page;
  renderSidebar();
  renderPage();
  if (window.innerWidth <= 768) toggleSidebar();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
}

document.getElementById('sidebarOverlay').addEventListener('click', toggleSidebar);

// ===== TABLE HELPERS =====
function renderTable(headers, rows, emptyMsg = 'Belum ada data') {
  if (!rows.length) return '<div class="empty"><i data-lucide="inbox"></i><p>' + emptyMsg + '</p></div>';
  return `<div class="table-wrap"><table><thead><tr>${headers.map(h=>'<th>'+h+'</th>').join('')}</tr></thead><tbody>${rows.map(r=>'<tr>'+r.map(c=>'<td>'+c+'</td>').join('')+'</tr>').join('')}</tbody></table></div>`;
}

function editIcon(id) { return '<button class="icon-btn" onclick="editRow('+id+')" title="Edit"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></button>'; }
function delIcon(id, label) { return '<button class="icon-btn danger" onclick="deleteRow('+id+','+JSON.stringify(label)+')" title="Hapus"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg></button>'; }

function badge(text, type) { return '<span class="badge badge-'+type+'">'+text+'</span>'; }
function fmtDate(d) { if (!d) return '-'; return new Date(d).toLocaleDateString('id-ID'); }
function fmtMoney(n) { return 'Rp ' + Number(n||0).toLocaleString('id-ID'); }

let editCb = null, deleteCb = null, currentSearch = '', currentPage = 1, pageSize = 15;

function renderPagination(total) {
  const pages = Math.ceil(total / pageSize);
  if (pages <= 1) return '';
  let html = '<div class="pagination">';
  html += '<button class="page-btn" onclick="goPage('+(currentPage-1)+')" '+(currentPage<=1?'disabled':'')+'>&laquo;</button>';
  for (let i = 1; i <= pages; i++) {
    if (i === 1 || i === pages || (i >= currentPage-2 && i <= currentPage+2)) {
      html += '<button class="page-btn'+(i===currentPage?' active':'')+'" onclick="goPage('+i+')">'+i+'</button>';
    } else if (i === currentPage-3 || i === currentPage+3) {
      html += '<span style="color:var(--text3);padding:0 4px">...</span>';
    }
  }
  html += '<button class="page-btn" onclick="goPage('+(currentPage+1)+')" '+(currentPage>=pages?'disabled':'')+'>&raquo;</button>';
  html += '</div>';
  return html;
}

function goPage(p) { currentPage = p; renderPage(); }

function filterData(data, search, fields) {
  if (!search) return data;
  const s = search.toLowerCase();
  return data.filter(item => fields.some(f => String(item[f]||'').toLowerCase().includes(s)));
}


// ===== PAGE RENDERERS =====
async function renderPage() {
  const p = S.page;
  document.getElementById('pageTitle').textContent = getPageTitle(p);
  document.getElementById('topbarActions').innerHTML = getTopActions(p);
  const c = document.getElementById('pageContent');
  c.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3)">Memuat...</div>';
  try {
    if (p === 'dashboard') await renderDashboard(c);
    else if (p === 'santri') await renderSantri(c);
    else if (p === 'kamar') await renderKamar(c);
    else if (p === 'kelas') await renderKelas(c);
    else if (p === 'kegiatan') await renderKegiatan(c);
    else if (p === 'kelompok') await renderKelompok(c);
    else if (p === 'jadwal') await renderJadwal(c);
    else if (p === 'absensi') await renderAbsensi(c);
    else if (p === 'absen-malam') await renderAbsenMalam(c);
    else if (p === 'absen-sekolah') await renderAbsenSekolah(c);
    else if (p === 'pelanggaran') await renderPelanggaran(c);
    else if (p === 'catatan') await renderCatatan(c);
    else if (p === 'pengumuman') await renderPengumuman(c);
    else if (p === 'rekap') await renderRekap(c);
    else if (p === 'users') await renderUsers(c);
    else if (p === 'settings') await renderSettings(c);
    else if (p === 'super-dashboard') await renderSuperDashboard(c);
    else if (p === 'super-sekolah') await renderSuperSekolah(c);
    else if (p === 'super-paket') await renderSuperPaket(c);
    else c.innerHTML = '<div class="empty"><p>Halaman tidak ditemukan</p></div>';
    lucide.createIcons();
  } catch (err) {
    c.innerHTML = '<div class="empty"><p style="color:var(--danger)">' + err.message + '</p></div>';
  }
}

function getPageTitle(p) {
  const t = {dashboard:'Dashboard',santri:'Data Santri',kamar:'Data Kamar',kelas:'Data Kelas',kegiatan:'Kegiatan',kelompok:'Kelompok',jadwal:'Jadwal',absensi:'Absensi',absen_malam:'Absen Malam',absen_sekolah:'Absen Sekolah',pelanggaran:'Pelanggaran',catatan:'Catatan Guru',pengumuman:'Pengumuman',rekap:'Rekap Absensi',users:'Pengguna',settings:'Pengaturan','super-dashboard':'Dashboard Super Admin','super-sekolah':'Kelola Sekolah','super-paket':'Paket'};
  return t[p] || p;
}

function getTopActions(p) {
  const addPages = ['santri','kamar','kelas','kegiatan','kelompok','jadwal','pelanggaran','catatan','pengumuman','users','super-sekolah'];
  if (addPages.includes(p)) return '<button class="btn btn-primary btn-sm" onclick="addRow()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> Tambah</button>';
  return '';
}

let santriCache = [];
async function renderSantri(c) {
  santriCache = await api('/api/santri/');
  const filtered = filterData(santriCache, currentSearch, ['nama','nis','nama_ayah','nama_ibu']);
  const page = filtered.slice((currentPage-1)*pageSize, currentPage*pageSize);
  const rows = page.map(s => [
    s.nis || '-', s.nama,
    s.kamar_nama || '-', s.kelas_nama || '-',
    badge(s.status === 'aktif' ? 'Aktif' : s.status, s.status === 'aktif' ? 'success' : 'danger'),
    s.nama_ayah || '-', s.no_hp_wali || '-',
    '<div class="actions">'+editIcon(s.id)+delIcon(s.id,s.nama)+'</div>'
  ]);
  c.innerHTML = `
    <div class="card">
      <div class="card-header"><h3>Data Santri (${filtered.length})</h3><input class="search-box" placeholder="Cari santri..." value="${currentSearch}" oninput="currentSearch=this.value;currentPage=1;renderPage()"></div>
      <div class="card-body">${renderTable(['NIS','Nama','Kamar','Kelas','Status','Nama Ayah','HP Wali','Aksi'], rows)}</div>
      ${renderPagination(filtered.length)}
    </div>`;
  lucide.createIcons();
  editCb = async (id) => {
    const s = santriCache.find(x => x.id === id);
    const kamar = await api('/api/kamar/').catch(() => []);
    const kelas = await api('/api/kelas/').catch(() => []);
    openModal('Edit Santri', renderSantriForm(s, kamar, kelas),
      '<button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-primary btn-sm" onclick="saveSantri('+id+')">Simpan</button>');
  };
  deleteCb = async (id) => { await api('/api/santri/'+id, {method:'DELETE'}); toast('Santri dihapus'); renderPage(); };
}

async function saveSantri(id) {
  const data = {
    nama: document.getElementById('f_nama').value,
    nis: document.getElementById('f_nis').value,
    kamar_id: document.getElementById('f_kamar').value || null,
    kelas_id: document.getElementById('f_kelas').value || null,
    nama_ayah: document.getElementById('f_ayah').value,
    nama_ibu: document.getElementById('f_ibu').value,
    no_hp_wali: document.getElementById('f_hp').value,
    status: document.getElementById('f_status').value,
  };
  if (!data.nama) return toast('Nama wajib diisi', 'error');
  if (id) { await api('/api/santri/'+id, {method:'PUT', body:JSON.stringify(data)}); toast('Santri diupdate'); }
  else { await api('/api/santri/', {method:'POST', body:JSON.stringify(data)}); toast('Santri ditambahkan'); }
  closeModal(); renderPage();
}

async function saveCat(id) { const d={santri_id:document.getElementById('f_santri').value,judul:document.getElementById('f_judul').value,kategori:document.getElementById('f_kategori').value,isi:document.getElementById('f_isi').value,tanggal:document.getElementById('f_tanggal').value}; if(!d.judul) return toast('Judul wajib','error'); if(id) await api('/api/catatan/'+id,{method:'PUT',body:JSON.stringify(d)}); else await api('/api/catatan/',{method:'POST',body:JSON.stringify(d)}); toast(id?'Diupdate':'Ditambahkan'); closeModal(); renderPage(); }

let pengCache = [];

  pengCache = await api('/api/pengumuman/').catch(()=>[]);
  const filtered = filterData(pengCache, currentSearch, ['judul','isi','target']);

function renderPengForm(p={}) { return '<div class="form-group"><label>Judul *</label><input id="f_judul" value="'+(p.judul||'')+'"></div><div class="form-group"><label>Isi *</label><textarea id="f_isi" rows="4">'+(p.isi||'')+'</textarea></div><div class="form-group"><label>Target</label><select id="f_target"><option value="semua"'+(p.target=='semua'||!p.target?' selected':'')+'>Semua</option><option value="ustadz"'+(p.target=='ustadz'?' selected':'')+'>Ustadz</option><option value="wali"'+(p.target=='wali'?' selected':'')+'>Wali</option><option value="admin"'+(p.target=='admin'?' selected':'')+'>Admin</option></select></div><div class="form-group"><label>Tanggal</label><input id="f_tanggal" type="date" value="'+(p.tanggal||new Date().toISOString().slice(0,10))+'"></div><div class="form-group"><label>Status</label><select id="f_aktif"><option value="ya"'+(p.aktif=='ya'||!p.aktif?' selected':'')+'>Aktif</option><option value="tidak"'+(p.aktif=='tidak'?' selected':'')+'>Nonaktif</option></select></div>'; }
async function savePeng(id) { const d={judul:document.getElementById('f_judul').value,isi:document.getElementById('f_isi').value,target:document.getElementById('f_target').value,tanggal:document.getElementById('f_tanggal').value,aktif:document.getElementById('f_aktif').value}; if(!d.judul||!d.isi) return toast('Judul dan isi wajib','error'); if(id) await api('/api/pengumuman/'+id,{method:'PUT',body:JSON.stringify(d)}); else await api('/api/pengumuman/',{method:'POST',body:JSON.stringify(d)}); toast(id?'Diupdate':'Ditambahkan'); closeModal(); renderPage(); }

// ===== USERS =====
let usrCache = [];
async function renderUsers(c) {
  usrCache = await api('/api/users/').catch(()=>[]);
  const filtered = filterData(usrCache, currentSearch, ['nama','username','role']);
  const page = filtered.slice((currentPage-1)*pageSize, currentPage*pageSize);
  const rows = page.map(u => [
    u.nama, u.username,
    badge(u.role==='admin'?'Admin':u.role==='ustadz'?'Ustadz':'Wali', u.role==='admin'?'danger':'info'),
    badge(u.status==='aktif'?'Aktif':'Nonaktif', u.status==='aktif'?'success':'danger'),

  ]);
  c.innerHTML = '<div class="card"><div class="card-header"><h3>Pengguna ('+filtered.length+')</h3><input class="search-box" placeholder="Cari..." value="'+currentSearch+'" oninput="currentSearch=this.value;currentPage=1;renderPage()"></div><div class="card-body">'+renderTable(['Nama','Username','Role','Status','Aksi'], rows, 'Belum ada pengguna')+'</div>'+renderPagination(filtered.length)+'</div>';

  editCb = (id) => { const u = usrCache.find(x=>x.id===id); openModal('Edit Pengguna', renderUsrForm(u), '<button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-primary btn-sm" onclick="saveUsr('+id+')">Simpan</button>'); };
  deleteCb = async (id) => { await api('/api/users/'+id,{method:'DELETE'}); toast('Dihapus'); renderPage(); };
}
function renderUsrForm(u={}) { return '<div class="form-group"><label>Nama *</label><input id="f_nama" value="'+(u.nama||'')+'"></div><div class="form-group"><label>Username *</label><input id="f_username" value="'+(u.username||'')+'"></div>'+(u.id?'':'<div class="form-group"><label>Password *</label><input id="f_pass" type="password"></div>')+'<div class="form-group"><label>Role</label><select id="f_role"><option value="ustadz"'+(u.role=='ustadz'||!u.role?' selected':'')+'>Ustadz</option><option value="admin"'+(u.role=='admin'?' selected':'')+'>Admin</option></select></div>'; }
async function saveUsr(id) { const d={nama:document.getElementById('f_nama').value,username:document.getElementById('f_username').value,role:document.getElementById('f_role').value}; const pass=document.getElementById('f_pass'); if(pass&&pass.value) d.password=pass.value; if(!d.nama||!d.username) return toast('Nama dan username wajib','error'); if(!id&&!d.password) return toast('Password wajib','error'); if(id) await api('/api/users/'+id,{method:'PUT',body:JSON.stringify(d)}); else await api('/api/users/',{method:'POST',body:JSON.stringify(d)}); toast(id?'Diupdate':'Ditambahkan'); closeModal(); renderPage(); }

let sekCache = [];
async function renderSuperSekolah(c) {
  sekCache = await api('/api/super/sekolah').catch(()=>[]);
  const filtered = filterData(sekCache, currentSearch, ['nama','slug','paket_nama']);
  const page = filtered.slice((currentPage-1)*pageSize, currentPage*pageSize);
  const rows = page.map(s => [
    s.nama, s.slug,
    s.paket_nama || '-', fmtMoney(s.harga_bulan)+'/bln',
    badge(s.status==='aktif'?'Aktif':s.status==='trial'?'Trial':'Suspend', s.status==='aktif'?'success':s.status==='trial'?'warning':'danger'),
    fmtDate(s.expired_at),
    (s.jumlah_santri||0)+' / '+(s.jumlah_users||0),
    '<div class="actions">'+
    '<button class="icon-btn" onclick="activateSekolah('+s.id+')" title="Aktifkan"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></button>'+
    '<button class="icon-btn" onclick="extendTrial('+s.id+')" title="Extend Trial"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></button>'+
    editIcon(s.id)+'</div>'
  ]);
  c.innerHTML = '<div class="card"><div class="card-header"><h3>Kelola Sekolah ('+filtered.length+')</h3><input class="search-box" placeholder="Cari..." value="'+currentSearch+'" oninput="currentSearch=this.value;currentPage=1;renderPage()"></div><div class="card-body">'+renderTable(['Nama','Slug','Paket','Harga','Status','Expired','Santri/Users','Aksi'], rows, 'Belum ada sekolah')+'</div>'+renderPagination(filtered.length)+'</div>';
  lucide.createIcons();
  editCb = (id) => { const s = sekCache.find(x=>x.id===id); openModal('Edit Sekolah', renderSekForm(s), '<button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-primary btn-sm" onclick="saveSek('+id+')">Simpan</button>'); };
}

function renderSekForm(s={}) { return '<div class="form-group"><label>Nama *</label><input id="f_nama" value="'+(s.nama||'')+'"></div><div class="form-group"><label>Slug *</label><input id="f_slug" value="'+(s.slug||'')+'"></div><div class="form-group"><label>Alamat</label><input id="f_alamat" value="'+(s.alamat||'')+'"></div><div class="form-group"><label>Kota</label><input id="f_kota" value="'+(s.nama_kota||'')+'"></div>'; }

async function saveSek(id) {
  const d = {nama:document.getElementById('f_nama').value,slug:document.getElementById('f_slug').value,alamat:document.getElementById('f_alamat').value,nama_kota:document.getElementById('f_kota').value};
  if(!d.nama||!d.slug) return toast('Nama dan slug wajib','error');
  await api('/api/super/sekolah/'+id,{method:'PUT',body:JSON.stringify(d)});
  toast('Sekolah diupdate'); closeModal(); renderPage();
}

async function activateSekolah(id) {
  openModal('Aktifkan Sekolah', '<div class="form-group"><label>Berapa bulan?</label><input id="f_months" type="number" value="1" min="1"></div>', '<button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-success btn-sm" onclick="doActivate('+id+')">Aktifkan</button>');
}
async function doActivate(id) {
  const m = parseInt(document.getElementById('f_months').value)||1;
  await api('/api/super/sekolah/'+id+'/activate',{method:'POST',body:JSON.stringify({months:m})});
  toast('Sekolah diaktifkan '+m+' bulan'); closeModal(); renderPage();
}

async function extendTrial(id) {
  openModal('Extend Trial', '<div class="form-group"><label>Tambah berapa hari?</label><input id="f_days" type="number" value="7" min="1"></div>', '<button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-warning btn-sm" onclick="doExtend('+id+')">Extend</button>');
}
async function doExtend(id) {
  const d = parseInt(document.getElementById('f_days').value)||7;
  await api('/api/super/sekolah/'+id+'/extend-trial',{method:'POST',body:JSON.stringify({days:d})});
  toast('Trial diperpanjang '+d+' hari'); closeModal(); renderPage();
}

async function renderSuperPaket(c) {
  const paket = await api('/api/super/paket').catch(()=>[]);
  const rows = paket.map(p => [p.nama, fmtMoney(p.harga_bulan)+'/bln', p.max_santri, p.max_users, Object.keys(p.fitur||{}).filter(k=>p.fitur[k]).join(', ')]);
  c.innerHTML = '<div class="card"><div class="card-header"><h3>Paket Langganan</h3></div><div class="card-body">'+renderTable(['Nama','Harga/Bulan','Max Santri','Max Users','Fitur'], rows)+'</div></div>';
}

// ===== GENERIC CRUD =====
function addRow() {
  const p = S.page;
  if (p === 'santri') { api('/api/kamar/').then(k=>api('/api/kelas/').then(kls=>{ openModal('Tambah Santri', renderSantriForm({},k,kls), '<button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-primary btn-sm" onclick="saveSantri(null)">Simpan</button>'); })); }
  else if (p === 'kamar') openModal('Tambah Kamar', renderKamarForm(), '<button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-primary btn-sm" onclick="saveKamar(null)">Simpan</button>');
  else if (p === 'kelas') openModal('Tambah Kelas', renderKelasForm(), '<button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-primary btn-sm" onclick="saveKelas(null)">Simpan</button>');
  else if (p === 'kegiatan') openModal('Tambah Kegiatan', renderKegiatanForm(), '<button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-primary btn-sm" onclick="saveKegiatan(null)">Simpan</button>');
  else if (p === 'kelompok') { api('/api/kegiatan/').then(k=>api('/api/users/').then(u=>{ openModal('Tambah Kelompok', renderKelompokForm({},k,u), '<button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-primary btn-sm" onclick="saveKelompok(null)">Simpan</button>'); })); }
  else if (p === 'jadwal') addJadwalUmum();
  else if (p === 'pelanggaran') { api('/api/santri/').then(s=>{ openModal('Tambah Pelanggaran', renderPelForm({},s), '<button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-primary btn-sm" onclick="savePel(null)">Simpan</button>'); }); }
  else if (p === 'catatan') { api('/api/santri/').then(s=>{ openModal('Tambah Catatan', renderCatForm({},s), '<button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-primary btn-sm" onclick="saveCat(null)">Simpan</button>'); }); }
  else if (p === 'pengumuman') openModal('Tambah Pengumuman', renderPengForm(), '<button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-primary btn-sm" onclick="savePeng(null)">Simpan</button>');
  else if (p === 'users') openModal('Tambah Pengguna', renderUsrForm(), '<button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-primary btn-sm" onclick="saveUsr(null)">Simpan</button>');
  else if (p === 'super-sekolah') openModal('Tambah Sekolah', '<div class="form-group"><label>Nama *</label><input id="f_nama"></div><div class="form-group"><label>Slug *</label><input id="f_slug" placeholder="darul-hikmah"></div><div class="form-group"><label>Admin Nama *</label><input id="f_admin_nama"></div><div class="form-group"><label>Admin Username *</label><input id="f_admin_user"></div><div class="form-group"><label>Admin Password *</label><input id="f_admin_pass" type="password"></div>', '<button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-primary btn-sm" onclick="doCreateSekolah()">Simpan</button>');
}

async function doCreateSekolah() {
  const d = {nama:document.getElementById('f_nama').value,slug:document.getElementById('f_slug').value,admin_nama:document.getElementById('f_admin_nama').value,admin_username:document.getElementById('f_admin_user').value,admin_password:document.getElementById('f_admin_pass').value};
  if(!d.nama||!d.slug||!d.admin_nama||!d.admin_username||!d.admin_password) return toast('Semua field wajib','error');
  await api('/api/super/sekolah',{method:'POST',body:JSON.stringify(d)});
  toast('Sekolah dibuat'); closeModal(); renderPage();
}

function editRow(id) { if (editCb) editCb(id); }
function deleteRow(id, label) {
  openModal('Konfirmasi Hapus', '<p>Yakin ingin menghapus <strong>'+label+'</strong>?</p><p class="text-muted" style="font-size:.8rem;margin-top:8px">Tindakan ini tidak bisa dibatalkan.</p>',
    '<button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-danger btn-sm" onclick="confirmDelete('+id+')">Hapus</button>');
}
function confirmDelete(id) { if (deleteCb) deleteCb(id); closeModal(); }

// ===== INIT =====
function initApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('appPage').style.display = 'block';
  document.getElementById('userName').textContent = S.user?.nama || '-';
  document.getElementById('userRole').textContent = S.user?.role || '-';
  document.getElementById('userAvatar').textContent = (S.user?.nama || 'A').charAt(0).toUpperCase();
  if (S.user?.role === 'superadmin') {
    document.getElementById('sidebarAppName').textContent = 'Super Admin';
    document.getElementById('sidebarSekolah').textContent = 'Pesantren SaaS';
  } else {
    api('/api/tenant-info').then(t => {
      S.sekolah = t;
      document.getElementById('sidebarAppName').textContent = t.app_name || 'Pesantren Absensi';
      document.getElementById('sidebarSekolah').textContent = t.nama || '-';
    }).catch(() => {});
  }
  renderSidebar();
  renderPage();
}

// ===== BOOT =====
(function boot() {
  document.getElementById('loginForm').addEventListener('submit', handleLogin);
  renderLoginFields();
  if (S.token && S.user) {
    initApp();
  } else {
    document.getElementById('loginPage').style.display = '';
    document.getElementById('appPage').style.display = 'none';
  }
  window.addEventListener('hashchange', () => { S.page = location.hash.slice(1) || 'dashboard'; renderSidebar(); renderPage(); });
})();
</script>
